<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMF | Senior Design Partner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overflow-x: clip;
    }

    /* ── THEME ── */
    :root {
      --bg:     #fff;
      --text:   #000;
      --border: rgba(0,0,0,0.45);
      --knob:   #ffffff;
      --track:  #DDDDDD;
    }

    [data-theme="dark"] {
      --bg:     #000;
      --text:   #fff;
      --border: rgba(255,255,255,0.45);
      --knob:   #444444;
      --track:  #222222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Work Sans', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ── NAV ── */
    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 2vw 5vw;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(13px, 1.3vw, 18px);
      letter-spacing: 0.04em;
      color: var(--text);
      transition: color 0.35s ease;
    }

    .nav-brand-square {
      width: 0.75em;
      height: 0.75em;
      display: inline-block;
      flex-shrink: 0;
      background: var(--text);
      transition: background 0.35s ease;
    }

    /* ── TOGGLE ── */
    .theme-toggle {
      cursor: pointer;
      display: flex;
      align-items: center;
      background: none;
      border: none;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    .toggle-track {
      width: 40px;
      height: 24px;
      border-radius: 9999px;
      background: var(--track);
      position: relative;
      transition: background 0.35s ease;
    }

    .toggle-knob {
      position: absolute;
      top: 50%;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 9999px;
      background: var(--knob);
      transform: translateY(-50%);
      transition: transform 0.35s ease, background 0.35s ease;
    }

    [data-theme="dark"] .toggle-knob {
      transform: translateY(-50%) translateX(16px);
    }

    /* ── NAV RIGHT ── */
    .nav-right {
      display: flex;
      justify-content: flex-end;
    }

    .nav-right a {
      font-size: clamp(13px, 1.3vw, 18px);
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.35s ease, opacity 0.2s ease;
    }

    @media (hover: hover) {
      .nav-right a:hover {
        text-decoration: underline;
        text-decoration-color: currentColor;
        text-decoration-thickness: 1px;
        text-underline-offset: 4px;
      }
    }

    /* ── HERO ── */
    .hero {
      position: sticky;
      top: 0;
      min-height: 620px;
      z-index: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      background: var(--bg);
      transition: background 0.35s ease;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-top: 128px;
      padding-left: 5vw;
    }

    .hero h1 {
      font-weight: 400;
      font-size: clamp(32px, 4.72vw, 68px);
      line-height: 1.09;
      letter-spacing: -0.01em;
      color: var(--text);
      max-width: 90vw;
      transition: color 0.35s ease;
    }

    .btn-read {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      padding: 12px 30px;
      border-radius: 40px;
      border: none;
      font-size: 15px;
      color: var(--bg);
      text-decoration: none;
      background: var(--text);
      letter-spacing: 0.01em;
      margin-top: 50px;
      transition: color 0.35s ease, background 0.35s ease, opacity 0.2s ease;
    }

    @media (hover: hover) {
      .btn-read:hover { opacity: 0.6; }
    }

    .desktop-break { display: block; }

    @media (max-width: 768px) {
      .desktop-break { display: none; }
    }

    /* ── VIDEO ── */
    .video-outer {
      position: relative;
      width: 100vw;
      height: 56.25vw;
    }

    .video-wrap {
      position: sticky;
      top: 0;
      height: 56.25vw;
      overflow: hidden;
      z-index: 1;
    }

    video {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-mobile { display: none; }

    /* ── MOBILE-ONLY ELEMENTS (hidden on desktop) ── */
    .tagline-section,
    footer,
    .footer-divider,
    .footer-brand-wrap,
    .footer-brand-large {
      display: none;
    }

    footer {
      background: var(--bg);
      transition: background 0.35s ease;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {

      nav {
        padding: 3.91vw 5.7vw;
      }

      .nav-brand {
        font-size: clamp(14px, 4.23vw, 26px);
      }

      .nav-brand-square {
        width: 0.75em;
        height: 0.75em;
      }

      .nav-right a {
        font-size: clamp(14px, 4.23vw, 26px);
      }

      /* ── TOGGLE: scaled for mobile ── */
      .toggle-track {
        width: 10.42vw;
        height: 6.25vw;
      }

      .toggle-knob {
        left: 0.78vw;
        width: 4.69vw;
        height: 4.69vw;
      }

      [data-theme="dark"] .toggle-knob {
        transform: translateY(-50%) translateX(4.17vw);
      }

      .hero {
        position: static;
        min-height: auto;
        padding-bottom: 0;
      }

      .hero-content {
        padding-top: 37.2vw;
        padding-left: 5.7vw;
        padding-right: 5.7vw;
      }

      .hero h1 {
        font-size: 7.49vw;
        line-height: 1.3;
        max-width: 100%;
        letter-spacing: -0.01em;
      }

      .btn-read {
        margin-top: 10.1vw;
        padding: 2.56vw 6.4vw;
        font-size: 3.2vw;
        background: var(--text);
        color: var(--bg);
      }

      /* ── VIDEO: disable sticky on mobile ── */
      .video-outer {
        height: auto;
        margin-top: 13.2vw;
      }

      .video-wrap {
        position: relative;
        height: auto;
        overflow: visible;
      }

      video {
        position: static;
        width: 100%;
        height: auto;
        object-fit: initial;
      }

      .video-desktop { display: none; }
      .video-mobile  { display: block; }

      /* ── TAGLINE ── */
      .tagline-section {
        display: block;
        margin-top: 12.9vw;
        padding: 0 5.7vw;
        background: var(--bg);
        transition: background 0.35s ease;
      }

      .tagline-text {
        font-size: 4.23vw;
        line-height: 1.4;
        letter-spacing: -0.01em;
        color: var(--text);
        transition: color 0.35s ease;
      }

      /* ── FOOTER (mobile) ── */
      footer {
        display: block;
        padding: 0 5.7vw;
      }

      .footer-copyright {
        display: block;
        font-size: 4.23vw;
        line-height: 1.4;
        letter-spacing: -0.01em;
        color: var(--text);
        margin-top: 14vw;
        margin-bottom: 0;
        transition: color 0.35s ease;
      }

      .footer-divider {
        display: block;
        border: none;
        border-top: 1px solid var(--border);
        margin-top: 2.77vw;
        width: calc(100% - 11.4vw);
        margin-left: 5.7vw;
      }

      /* ── LARGE BRAND ── */
      .footer-brand-wrap {
        display: block;
        overflow: hidden;
      }

      .footer-brand-large {
        display: block;
        font-family: 'Work Sans', sans-serif;
        font-weight: 600;
        font-size: 31.36vw;
        line-height: 1.09;
        letter-spacing: -0.01em;
        text-align: center;
        white-space: nowrap;
        color: var(--text);
        margin-top: 5.38vw;
        margin-bottom: -40px;
        padding: 0;
        background: var(--bg);
        transition: color 0.35s ease, background 0.35s ease;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-brand">
      <div class="nav-brand-square"></div>
      ADMF
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
      <div class="toggle-track">
        <div class="toggle-knob"></div>
      </div>
    </button>

    <div class="nav-right">
      <a href="mailto:hello.admf@gmail.com">Let's talk</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>A senior multidisciplinary design partner.<br class="desktop-break"> Visual craft and product thinking, without the overhead of a traditional agency.</h1>
      <a href="admf.work_credentials.pdf" target="_blank" rel="noopener" class="btn-read">See how we work</a>
    </div>
  </section>

  <!-- VIDEO -->
  <div class="video-outer">
    <div class="video-wrap">
      <video class="video-desktop" autoplay muted loop playsinline>
        <source src="Video/ad_d.mp4" type="video/mp4">
      </video>
      <video class="video-mobile" autoplay muted loop playsinline>
        <source src="Video/ad_m.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <!-- TAGLINE (mobile only) -->
  <section class="tagline-section">
    <p class="tagline-text">Remote by default,<br>available globally.</p>
  </section>

  <!-- FOOTER (mobile only) -->
  <footer>
    <span class="footer-copyright">Copyright &copy; 2026 ADMF</span>
  </footer>

  <hr class="footer-divider">

  <!-- LARGE BRAND (mobile only) -->
  <div class="footer-brand-wrap">
    <div class="footer-brand-large">ADMF</div>
  </div>

  <script>
    const toggle = document.getElementById('themeToggle');
    toggle.addEventListener('click', function () {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
    });
  </script>

</body>
</html>
